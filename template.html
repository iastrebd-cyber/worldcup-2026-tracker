<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ЧЕМПИОНАТ МИРА 2026 — Турнирная таблица</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0f1e;
    --panel:#141d33;
    --panel-2:#0e1528;
    --line:#243150;
    --text:#eef2fb;
    --muted:#8b96b3;
    --gold:#f5c451;
    --green:#34c77b;
    --red:#e5556a;
    --amber:#f0a93c;
    --font-head:"Oswald","Arial Narrow",system-ui,sans-serif;
    --font-text:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
  }

  *{box-sizing:border-box}

  html{-webkit-text-size-adjust:100%}

  body{
    margin:0;
    background:
      radial-gradient(1200px 600px at 50% -10%, #16223f 0%, rgba(22,34,63,0) 60%),
      radial-gradient(900px 500px at 100% 0%, #102a3a 0%, rgba(16,42,58,0) 55%),
      var(--bg);
    color:var(--text);
    font-family:var(--font-text);
    line-height:1.45;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  a{color:inherit}

  /* ---------- Layout shell ---------- */
  .wrap{max-width:1240px;margin:0 auto;padding:18px 16px 64px}

  /* ---------- Header ---------- */
  .hero{
    text-align:center;
    padding:26px 16px 22px;
    border:1px solid var(--line);
    border-radius:18px;
    background:linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
    box-shadow:0 18px 50px rgba(0,0,0,.45);
    position:relative;
    overflow:hidden;
  }
  .hero::before{
    content:"";
    position:absolute;inset:0;
    background:linear-gradient(90deg, rgba(245,196,81,.08), rgba(52,199,123,.08));
    pointer-events:none;
  }
  .hero__eyebrow{
    font-family:var(--font-head);
    letter-spacing:.32em;
    font-weight:600;
    font-size:clamp(11px,2.4vw,14px);
    color:var(--gold);
    margin:0;
  }
  .hero__hosts{
    font-family:var(--font-head);
    letter-spacing:.28em;
    font-size:clamp(10px,2.2vw,13px);
    color:var(--muted);
    margin:6px 0 14px;
    font-weight:500;
  }
  .hero__title{
    font-family:var(--font-head);
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.04em;
    line-height:1.02;
    font-size:clamp(30px,7.5vw,68px);
    margin:0;
  }
  .hero__title .yr{
    background:linear-gradient(90deg,var(--gold) 0%,#ffffff 50%,var(--green) 100%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .status{
    margin:16px auto 0;
    display:flex;
    flex-wrap:wrap;
    gap:8px 10px;
    justify-content:center;
    font-size:clamp(11px,2.3vw,13px);
  }
  .chip{
    display:inline-flex;
    align-items:center;
    gap:7px;
    padding:6px 12px;
    border:1px solid var(--line);
    border-radius:999px;
    background:rgba(255,255,255,.02);
    color:var(--muted);
  }
  .chip b{color:var(--text);font-weight:600}
  .chip--live{border-color:rgba(52,199,123,.5)}
  .chip--live .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--green);
    box-shadow:0 0 0 4px rgba(52,199,123,.18);
  }

  /* ---------- Tabs (pure CSS, no JS) ---------- */
  .tabswitch{position:absolute;opacity:0;pointer-events:none;width:1px;height:1px}

  .tabs{
    display:flex;
    gap:8px;
    margin:22px 0 18px;
    padding:6px;
    border:1px solid var(--line);
    border-radius:14px;
    background:var(--panel-2);
  }
  .tab{
    flex:1 1 0;
    text-align:center;
    padding:12px 14px;
    border-radius:10px;
    font-family:var(--font-head);
    font-weight:600;
    letter-spacing:.06em;
    text-transform:uppercase;
    font-size:clamp(12px,2.6vw,15px);
    color:var(--muted);
    cursor:pointer;
    user-select:none;
    transition:background .18s ease,color .18s ease,box-shadow .18s ease;
  }
  .tab:hover{color:var(--text)}

  /* active states driven by checked radios */
  #tab-groups:checked ~ .tabs .tab--groups,
  #tab-bracket:checked ~ .tabs .tab--bracket{
    color:#0a0f1e;
    background:linear-gradient(180deg,var(--gold),#e2af3c);
    box-shadow:0 8px 20px rgba(245,196,81,.28);
  }

  /* keyboard focus visibility */
  #tab-groups:focus-visible ~ .tabs .tab--groups,
  #tab-bracket:focus-visible ~ .tabs .tab--bracket{
    outline:3px solid var(--green);
    outline-offset:2px;
  }

  .panel{display:none}
  #tab-groups:checked ~ main .panel--groups{display:block}
  #tab-bracket:checked ~ main .panel--bracket{display:block}

  /* ---------- Legend ---------- */
  .legend{
    display:flex;flex-wrap:wrap;gap:10px 18px;
    margin:0 0 16px;
    font-size:12.5px;color:var(--muted);
  }
  .legend span{display:inline-flex;align-items:center;gap:8px}
  .swatch{width:14px;height:14px;border-radius:4px;flex:none}
  .swatch--green{background:var(--green)}
  .swatch--amber{background:var(--amber)}
  .swatch--red{background:var(--red)}

  /* ---------- Groups grid ---------- */
  .groups{
    display:grid;
    grid-template-columns:1fr;
    gap:16px;
  }
  @media(min-width:560px){
    .groups{grid-template-columns:repeat(auto-fill,minmax(330px,1fr))}
  }

  .group{
    border:1px solid var(--line);
    border-radius:16px;
    background:linear-gradient(180deg,var(--panel) 0%,var(--panel-2) 100%);
    overflow:hidden;
    box-shadow:0 12px 30px rgba(0,0,0,.35);
  }
  .group__head{
    display:flex;align-items:center;gap:12px;
    padding:14px 16px;
    border-bottom:1px solid var(--line);
  }
  .group__badge{
    width:38px;height:38px;flex:none;
    display:grid;place-items:center;
    border-radius:10px;
    font-family:var(--font-head);
    font-weight:700;font-size:20px;
    color:#0a0f1e;
    background:linear-gradient(180deg,var(--gold),#e2af3c);
    box-shadow:0 6px 16px rgba(245,196,81,.3);
  }
  .group__title{
    margin:0;
    font-family:var(--font-head);
    font-weight:600;letter-spacing:.04em;
    text-transform:uppercase;font-size:16px;
  }

  table.tbl{width:100%;border-collapse:collapse;font-size:13px}
  table.tbl th,table.tbl td{
    padding:8px 6px;text-align:center;
    border-bottom:1px solid rgba(36,49,80,.6);
    white-space:nowrap;
  }
  table.tbl thead th{
    color:var(--muted);
    font-weight:600;
    font-size:11px;letter-spacing:.04em;
    text-transform:uppercase;
  }
  table.tbl .c-team{text-align:left;width:99%}
  table.tbl tbody tr:last-child td{border-bottom:none}
  .fl{margin-right:6px}
  .pts{
    font-family:var(--font-head);
    font-weight:700;font-size:15px;
    color:var(--gold);
  }
  .gd--pos{color:var(--green)}
  .gd--neg{color:var(--red)}
  .gd--zero{color:var(--muted)}

  /* position colour bars on the left edge */
  table.tbl tbody tr{position:relative}
  table.tbl tbody tr .c-team{border-left:3px solid transparent}
  tr.pos-1 .c-team,tr.pos-2 .c-team{border-left-color:var(--green)}
  tr.pos-3 .c-team{border-left-color:var(--amber)}
  tr.pos-4 .c-team{border-left-color:var(--red)}
  tr.pos-4{opacity:.78}

  /* ---------- Played matches list ---------- */
  .matches{
    list-style:none;margin:0;padding:12px 14px 16px;
    display:flex;flex-direction:column;gap:8px;
    border-top:1px solid var(--line);
    background:rgba(0,0,0,.12);
  }
  .matches__empty{color:var(--muted);font-size:12.5px;text-align:center;padding:4px}
  .match{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;gap:8px;
    font-size:12.5px;
  }
  .match .team{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .match .team--home{text-align:right}
  .match .team--away{text-align:left}
  .team--win{color:var(--text);font-weight:600}
  .team--lose{color:var(--muted)}
  .score{
    font-family:var(--font-head);
    font-weight:700;
    padding:3px 9px;border-radius:7px;
    white-space:nowrap;
  }
  .score--win{background:rgba(52,199,123,.18);color:#7ce0ac;border:1px solid rgba(52,199,123,.4)}
  .score--draw{background:rgba(245,196,81,.16);color:var(--gold);border:1px solid rgba(245,196,81,.4)}

  /* hide secondary columns on small screens */
  @media(max-width:560px){
    .c-opt{display:none}
  }

  /* ---------- Bracket ---------- */
  .bracket-scroll{
    overflow-x:auto;
    padding-bottom:12px;
    -webkit-overflow-scrolling:touch;
  }
  .bracket{
    display:flex;
    gap:18px;
    min-width:max-content;
    align-items:stretch;
  }
  .round{
    flex:0 0 220px;
    display:flex;flex-direction:column;
  }
  .round__head{
    text-align:center;
    margin-bottom:12px;
  }
  .round__title{
    font-family:var(--font-head);
    font-weight:700;letter-spacing:.06em;
    text-transform:uppercase;font-size:15px;
    margin:0;
  }
  .round__dates{color:var(--muted);font-size:11.5px;margin-top:2px}
  .round__body{
    display:flex;flex-direction:column;
    gap:12px;
    justify-content:space-around;
    flex:1;
  }
  .tie{
    border:1px solid var(--line);
    border-radius:12px;
    background:linear-gradient(180deg,var(--panel) 0%,var(--panel-2) 100%);
    padding:10px 12px;
    display:flex;flex-direction:column;gap:6px;
    font-size:12.5px;
  }
  .tie__team{
    display:flex;justify-content:space-between;gap:8px;
    color:var(--muted);
  }
  .tie__vs{
    text-align:center;color:var(--line);
    font-family:var(--font-head);font-size:11px;letter-spacing:.2em;
  }
  .tie__vs--score{
    color:#7ce0ac;font-weight:700;font-size:13px;letter-spacing:0;
  }
  .tie__name{
    display:flex;align-items:center;min-width:0;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .tie__team--win{color:var(--text);font-weight:700}
  .tie__team--lose{color:var(--muted)}
  .tie--tbd .tie__name{opacity:.6}
  .round--final{justify-content:center}
  .cup{
    text-align:center;
    align-self:center;
    font-size:46px;
    margin:6px 0 10px;
    filter:drop-shadow(0 6px 18px rgba(245,196,81,.4));
  }
  .final-card{
    border:1px solid var(--gold);
    border-radius:14px;
    background:linear-gradient(180deg,rgba(245,196,81,.12),rgba(14,21,40,.6));
    padding:16px;
    text-align:center;
  }
  .final-card h3{
    font-family:var(--font-head);
    margin:0 0 8px;letter-spacing:.06em;
    text-transform:uppercase;font-size:16px;
    color:var(--gold);
  }
  .final-card p{margin:4px 0;font-size:12.5px;color:var(--muted)}
  .final-card .big{color:var(--text);font-weight:600;font-size:14px}

  /* ---------- Footer ---------- */
  .foot{
    text-align:center;color:var(--muted);
    font-size:12px;margin-top:26px;
  }

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;animation:none !important;scroll-behavior:auto !important}
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- pure-CSS tab state: radios precede .tabs and main so ~ selectors work -->
  <input class="tabswitch" type="radio" name="tab" id="tab-groups" checked aria-label="Показать группы">
  <input class="tabswitch" type="radio" name="tab" id="tab-bracket" aria-label="Показать сетку плей-офф">

  <header class="hero">
    <p class="hero__eyebrow">FIFA WORLD CUP</p>
    <p class="hero__hosts">США · КАНАДА · МЕКСИКА</p>
    <h1 class="hero__title">ЧЕМПИОНАТ МИРА <span class="yr">2026</span></h1>
    <div class="status">
      <span class="chip chip--live"><span class="dot"></span>Обновлено: <b><!-- UPDATED --></b></span>
      <span class="chip">48 команд · 12 групп · плей-офф с 1/16 финала</span>
      <span class="chip">Финал 19 июля · <b>Нью-Джерси</b></span>
    </div>
  </header>

  <nav class="tabs" role="tablist" aria-label="Разделы">
    <label class="tab tab--groups" for="tab-groups" tabindex="0">Группы</label>
    <label class="tab tab--bracket" for="tab-bracket" tabindex="0">Сетка плей-офф</label>
  </nav>

  <main>
    <!-- ============ GROUPS ============ -->
    <section class="panel panel--groups" aria-label="Группы">
      <div class="legend">
        <span><i class="swatch swatch--green"></i> 1–2 место · выход в плей-офф</span>
        <span><i class="swatch swatch--amber"></i> 3 место · шанс как лучший третий</span>
        <span><i class="swatch swatch--red"></i> 4 место · вылет</span>
      </div>
      <div class="groups">
        <!-- GROUPS -->
      </div>
    </section>

    <!-- ============ BRACKET ============ -->
    <section class="panel panel--bracket" aria-label="Сетка плей-офф">
      <div class="bracket-scroll">
        <div class="bracket">
          <!-- BRACKET -->
        </div>
      </div>
    </section>
  </main>

  <p class="foot">Данные: football-data.org · обновляется автоматически</p>

</div>
</body>
</html>
